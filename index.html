        .no-scrollbar::-webkit-scrollbar { display: none; }

        const itemInput = document.getElementById('itemInput');
        const statusSpan = document.getElementById('syncStatus');

        itemInput.addEventListener('blur', () => { isTyping = false; });
        itemInput.addEventListener('input', () => { isTyping = true; });

            statusSpan.innerText = `● ${text}`;
            statusSpan.className = isError

                : "text-[10px] bg-slate-950/30 px-2 py-0.5 rounded-full text-emerald-300";
        }
